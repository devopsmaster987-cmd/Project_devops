apiVersion: v1
kind: Service
metadata:
  labels:
    app: vpromq01
  name: vpromq01
spec:
  selector:
    app: vpromq01
  type: ClusterIP
  ports:
  - name: amqp
    port: 5672
    protocol: TCP
    targetPort: amqp
  - name: management
    port: 15672
    protocol: TCP
    targetPort: management
